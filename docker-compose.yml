name: jobintel

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobintel
      POSTGRES_PASSWORD: jobintel
      POSTGRES_DB: jobintel
    ports:
      - "5432:5432"
    volumes:
      - jobintel_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobintel -d jobintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - jobintel_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jobintel
      MINIO_ROOT_PASSWORD: jobintel123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - jobintel_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jobintel_postgres_data:
  jobintel_redis_data:
  jobintel_minio_data:
